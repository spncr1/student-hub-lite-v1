<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>NEXA - Tasks</title>
        
        <!-- CSS stylesheet -->
        <link rel="stylesheet" href="/client/features/Tasks/tasks.css">
        <link rel="stylesheet" href="/client/shared/styles/dark-mode.css">

        <!-- Primary Font (Headers & Titles - Manrope) -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">

        <!-- Secondary Font (Body Text - Noto Sans) -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        
        <!-- Favicon -->
        <link rel="icon" type="image/png" href="/client/shared/assets/Images/nexa-v1.png">
    </head>
    <body class="tasks-page">

        <nav class="navbar">
            <button class="menu-toggle" aria-label="Toggle navigation">
                ☰
            </button>
            
            <ul>
                <li><a href="/index.html">Home</a></li>
                <li><a href="/client/features/Tasks/tasks.html" class="active">Tasks</a></li>
                <li><a href="/client/features/Assignments/assignments.html">Assignments</a></li>
                <li><a href="/client/features/StudyPlanner/study-planner.html">Study Planner</a>
                <li><a href="/client/features/Habits/habits.html">Habits</a>
                <li><a href="/client/features/JobApplications/job-applications.html">Job Applications</a>
                <li><a href="/client/features/Finances/finances.html">Finances</a>
            </ul>
        </nav>

        <main class="content">
            <header class="tasks-page-header">
                <h1 class="page-title">TASKS PLANNER</h1>
            </header>

            <section class="tasks-controls" aria-label="Tasks controls">
                <div class="tasks-nav-group">
                    <button id="today-btn">TODAY</button>
                    <button id="previous-btn" class="tasks-nav-btn" aria-label="Previous period"><</button>
                    <button id="next-btn" class="tasks-nav-btn" aria-label="Next period">></button>
                </div>

                <div class="tasks-range-label-wrap">
                    <h2 id="tasks-range-label">Week of ...</h2>
                </div>

                <div class="tasks-view-toggle" role="tablist" aria-label="Calendar view">
                    <button id="week-view-btn" class="btn-secondary active" type="button" role="tab" aria-selected="true">Week</button>
                    <button id="month-view-btn" class="btn-secondary" type="button" role="tab" aria-selected="false">Month</button>
                </div>
            </section>

            <section id="tasks-week-view" class="tasks-surface" aria-label="Weekly tasks schedule">
                <div class="tasks-grid-shell">
                    <div class="tasks-week-header-row">
                        <div class="tasks-time-header">TIME</div>
                        <div id="tasks-week-header" class="tasks-week-header"></div>
                    </div>

                    <div class="tasks-week-body-row">
                        <div id="tasks-week-time-rail" class="tasks-time-rail" aria-hidden="true"></div>
                        <div id="tasks-week-body" class="tasks-week-body"></div>
                    </div>
                </div>
            </section>

            <template id="week-slot-template">
                <div class="week-slot">
                    <button type="button" class="slot-add-btn" aria-label="Add task">+</button>
                    <div class="slot-quarter-grid">
                        <div class="slot-quarter" data-quarter="0"></div>
                        <div class="slot-quarter" data-quarter="1"></div>
                        <div class="slot-quarter" data-quarter="2"></div>
                        <div class="slot-quarter" data-quarter="3"></div>
                    </div>
                </div>
            </template>

            <section id="tasks-month-view" class="tasks-surface hidden" aria-label="Monthly tasks schedule">
                <div class="tasks-month-layout">
                    <div class="tasks-month-calendar">
                        <div class="tasks-month-weekdays" aria-hidden="true">
                            <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
                        </div>
                        <div id="tasks-month-days" class="tasks-month-days" role="grid" aria-label="Month"></div>
                    </div>

                    <div class="tasks-month-agenda">
                        <h3 id="tasks-selected-date-label" class="tasks-selected-date-label">Selected date</h3>
                        <div class="tasks-month-agenda-grid">
                            <div id="tasks-month-time-rail" class="tasks-time-rail" aria-hidden="true"></div>
                            <div id="tasks-month-body" class="tasks-month-body"></div>
                        </div>
                    </div>
                </div>
            </section>

            <div id="modal-backdrop" class="hidden"></div>

            <div id="add-task-modal" class="hidden" role="dialog" aria-modal="true" aria-label="Add task">
                <h3 id="task-modal-title" align="center">ADD TASK</h3>

                <div class="form-row">
                    <label for="task-title"><strong>Title</strong></label>
                    <input id="task-title" type="text" placeholder="e.g., Finish tutorial">
                </div>

                <div class="form-row">
                    <label for="task-notes"><strong>Notes</strong></label>
                    <textarea id="task-notes" rows="3" placeholder="Optional..."></textarea>
                </div>

                <div class="form-row">
                    <label for="task-priority"><strong>Priority</strong></label>
                    <select id="task-priority">
                        <option value="high">High</option>
                        <option value="medium" selected>Medium</option>
                        <option value="low">Low</option>
                    </select>
                </div>

                <div class="form-row">
                    <label for="task-time"><strong>Time</strong></label>
                    <input id="task-time" type="time" step="60">
                </div>

                <p id="task-status" class="task-status"></p>
                <p id="task-schedule-context" class="task-schedule-context"></p>

                <div class="modal-actions">
                    <button class="btn-secondary" id="cancel-task-btn">Cancel</button>
                    <button class="btn-secondary hidden" id="delete-task-btn">Delete</button>
                    <button class="btn-secondary" id="confirm-task-btn">Add</button>
                </div>
            </div>

            <!-- SYSTEM SETTINGS MODAL -->
              <div id="system-settings-modal" class="hidden" role="dialog" aria-modal="true" aria-label="System Settings">
                <div class="settings-layout">
                    <aside class="settings-sidebar">
                        <ul class="settings-sidebar-list">
                            <li><button type="button" class="settings-nav" data-tab="general">General</button></li>
                            <li><button type="button" class="settings-nav" data-tab="account">Account</button></li>
                            <li><button type="button" class="settings-nav" data-tab="customise">Customise</button></li>
                        </ul>
                    </aside>

                    <!-- Main content -->
                     <div class="settings-content">
                        <div class="settings-header">
                            <h3 class="settings-title">SYSTEM SETTINGS</h3>
                            <div id="settings-subtitle" class="settings-subtitle">General</div>
                        </div>

                        <div class="settings-body">
                            <div class="settings-panel" data-panel="general">
                                <div class="setting-row">
                                    <div>
                                        <div class="setting-labels">Reset App Data</div>
                                    </div>
                                    <button type="button" id="reset-app-data-btn" class="setting-action-btn danger">Reset</button>
                                </div>

                                <div class="setting-row">
                                    <div>
                                        <div class="setting-labels">Load Demo Data</div>
                                    </div>
                                    <button type="button" id="load-demo-data-btn" class="setting-action-btn success">Load</button>
                                </div>
                            </div>

                            <div class="settings-panel hidden" data-panel="account">
                                <div class="setting-row">
                                    <div>
                                        <div class="setting-labels">Name</div>
                                    </div>
                                    <input type="text" id="account-name-input" class="setting-account-input">
                                </div>

                                <div class="setting-row">
                                    <div>
                                        <div class="setting-labels">Semester label</div>
                                    </div>
                                    <input type="text" id="account-semester-input" class="setting-account-input">
                                </div>

                                <div class="setting-row">
                                    <div>
                                        <div class="setting-labels">Save account details</div>
                                    </div>
                                    <button type="button" id="save-account-btn" class="setting-action-btn success">Save</button>
                                </div>
                            </div>

                            <div class="settings-panel" data-panel="customise">
                                <div class="setting-row">
                                    <div>
                                        <div class="setting-labels">Dark mode</div>
                                    </div>

                                    <label class="switch">
                                        <input type="checkbox" id="dark-mode-toggle">
                                        <span class="slider"></span>
                                    </label>
                                </div>
                            </div>
                        </div>
                     </div>
                </div>
              </div>
              
              <!-- System Settings Button (placement)-->
             <div class="system-settings">
                <button id="system-settings-btn">⚙️</button>
             </div>
        </main>
        
        <script src="/client/shared/app-storage.js"></script>
        <script src="/client/features/Tasks/tasks.js"></script>
    </body>
</html>
