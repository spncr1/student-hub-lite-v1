<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Student Hub (Lite) Dashboard</title>
        
        <!-- CSS stylesheet -->
        <link rel="stylesheet" href="/Styling/style.css">
        <link rel="stylesheet" href="/Styling/dark-mode.css">

        <!-- Fonts will go here (once decided)... -->
        
        <!-- Favicon goes here... -->
    </head>
    <body>

        <nav class="navbar">
            <button class="menu-toggle" aria-label="Toggle navigation">
                ☰
            </button>
            
            <ul>
                <li><a href="/index.html" class="active">Home</a></li>
                <li><a href="/Tasks/tasks.html">Tasks</a></li>
                <li><a href="/Assignments/assignments.html">Assignments</a></li>
            </ul>
        </nav>

        <main class="content">
            <button id="today-btn">TODAY</button>
            
            <div class="date-header">

                <div class="date-row">
                    <button id="previous-btn"><</button>

                    <div class="date-text">
                        <h1 id="date-display"></h1>
                        <h2 id="day-display"></h2>
                    </div>

                    <button id="next-btn">></button>
                </div>
            </div>
            
            <hr>
            <h2>Welcome, <span id="welcome-name"></span>.</h2> <!-- (name) is just a placeholder for now, will use a variable that stores the logged in user later to replace this -->

            <!-- Today's Tasks & Assignments Due dashboard cards -->
            <div class="dashboard-cards">
                    <div class="today-tasks">
                    <div class="today-tasks-header">
                        <button id="add-task-btn">+</button>
                        
                        <h2>TODAY'S TASKS</h2>
                        
                        <button id="sort-btn">\|/</button>
                        <!-- Sort dropdown panel-->
                        <div id="sort-panel" class="sort-panel hidden" role="menu" aria-label="Sort Tasks">
                            <div class="sort-row">
                                <label for="sort-select"><strong>Sort By</strong></label>
                                <select id="sort-select">
                                    <option value="az">A-Z</option>
                                    <option value="za">Z-A</option>
                                    <option value="priority">Priority</option>
                                    <option value="lastUpdated">Last Updated</option>
                                    <option value="createdNewOld">Created (new -> old)</option>
                                    <option value="createdOldNew">Created (old -> new)</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Task list rendered here via JS -->
                    <ul id="task-list"></ul>
                </div>

                <div class="assignments-due">
                    <div class="assignments-due-header">
                        <h2>ASSIGNMENTS DUE TODAY</h2>
                    </div>
                </div>
            </div>

             <div id="modal-backdrop" class="hidden"></div>

             <!-- ADD TASK MODAL -->
             <div id="add-task-modal" class="hidden" role="dialog" aria-modal="true">
                <h3 id="task-modal-title" align="center">ADD TASK</h3>
                <!-- Title -->
                 <div class="form-row">
                    <label for="task-title"><strong>Title</strong></label>
                    <input id="task-title" type="text" placeholder="e.g., Finish tutorial">
                 </div>

                <!-- Notes -->
                <div class="form-row">
                    <label for="task-notes"><strong>Notes</strong></label>
                    <textarea id="task-notes" rows="3" placeholder="Optional..."></textarea>
                </div>

                <!-- Priority -->
                <div class="form-row">
                    <label for="task-priority"><strong>Priority</strong></label>
                    <select id="task-priority">
                        <option value="high">High</option>
                        <option value="medium" selected>Medium</option>
                        <option value="low">Low</option>
                    </select>
                </div> 
                
                 <!-- success message (if added task successfully) -->
                  <p id="task-status" class="task-status"></p>

                 <div class="modal-actions">
                    <button id="cancel-task-btn">Cancel</button>
                    <button id="delete-task-btn" class="hidden">Delete</button>
                    <button id="confirm-task-btn">Add</button> <!-- task adding confirmation -->
                 </div>
             </div>

             <!-- SYSTEM SETTINGS MODAL -->
              <div id="system-settings-modal" class="hidden" role="dialog" aria-modal="true" aria-label="System Settings">
                <div class="settings-layout">
                    <aside class="settings-sidebar">
                        <ul class="settings-sidebar-list">
                            <li><button type="button" class="settings-nav" data-tab="general">General</button></li>
                            <li><button type="button" class="settings-nav" data-tab="account">Account</button></li>
                            <li><button type="button" class="settings-nav" data-tab="customise">Customise</button></li>
                        </ul>
                    </aside>

                    <!-- Main content -->
                     <div class="settings-content">
                        <div class="settings-header">
                            <h3 class="settings-title">SYSTEM SETTINGS</h3>
                            <div id="settings-subtitle" class="settings-subtitle">General</div>
                        </div>

                        <div class="settings-body">
                            <div class="settings-panel" data-panel="general">
                                <p>More to come...</p>
                            </div>

                            <div class="settings-panel hidden" data-panel="account">
                                <p>More to come...</p>
                            </div>

                            <div class="settings-panel" data-panel="customise">
                                <div class="setting-row">
                                    <div>
                                        <div class="setting-labels">Dark mode</div>
                                    </div>

                                    <label class="switch">
                                        <input type="checkbox" id="dark-mode-toggle">
                                        <span class="slider"></span>
                                    </label>
                                </div>
                            </div>
                        </div>
                     </div>
                </div>
              </div>
              
              <!-- System Settings Button (placement)-->
             <div class="system-settings">
                <button id="system-settings-btn">⚙️</button>
             </div>

             <!-- Calendar View (third dashboard card) - not sure how I'll implement this just yet, so just keeping as a placeholder here for now to implement later -->
        </main>
        
        <script src="/index.js"></script>
    </body>
</html>
