<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Student Hub (Lite) Dashboard</title>
        
        <!-- CSS stylesheet -->
        <link rel="stylesheet" href="style.css">

        <!-- Fonts will go here (once decided)... -->
        
        <!-- Favicon goes here... -->
    </head>
    <body>

        <nav class="navbar">
            <button class="menu-toggle" aria-label="Toggle navigation">
                ☰
            </button>
            
            <ul>
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="tasks.html">Tasks</a></li>
                <li><a href="assignments.html">Assignments</a></li>
            </ul>
        </nav>

        <main class="content">
            <button id="today-btn">TODAY</button>
            
            <div class="date-header">

                <div class="date-row">
                    <button id="previous-btn"><</button>

                    <div class="date-text">
                        <h1 id="date-display"></h1>
                        <h2 id="day-display"></h2>
                    </div>

                    <button id="next-btn">></button>
                </div>
            </div>
            
            <hr>
            <h2>Welcome, <span id="welcome-name"></span>.</h2> <!-- (name) is just a placeholder for now, will use a variable that stores the logged in user later to replace this -->

            <!-- Today's Tasks (first dashboard card) -->
             <div class="today-tasks">
                <div class="today-tasks-header">
                    <button id="add-task-btn">+</button>
                    
                    <h2>TODAY'S TASKS</h2>
                    
                    <button id="sort-btn">\|/</button>
                    <!-- Sort dropdown panel-->
                    <div id="sort-panel" class="sort-panel hidden" role="menu" aria-label="Sort Tasks">
                        <label><strong>Sort By</strong></label>
                        <div id="sort-options" class="sort-options" role="menu">
                            <button type="button" class="sort-option" data-sort="az">A-Z</button>
                            <button type="button" class="sort-option" data-sort="za">Z-A</button>
                            <button type="button" class="sort-option" data-sort="priority">Priority</button>
                            <button type="button" class="sort-option" data-sort="lastUpdated">Last Updated</button>
                            <button type="button" class="sort-option" data-sort="createdNewOld">Created (new -> old)</button>
                            <button type="button" class="sort-option" data-sort="createdOldNew">Created (old -> new)</button>
                        </div>
                    </div>
                </div>

                <!-- Task list rendered here via JS -->
                <ul id="task-list"></ul>
             </div>

             <div id="modal-backdrop" class="hidden"></div>
             <div id="add-task-modal" class="hidden" role="dialog" aria-modal="true">
                <h3 id="task-modal-title" align="center">ADD TASK</h3>
                <!-- Title -->
                 <div class="form-row">
                    <label for="task-title"><strong>Title</strong></label>
                    <input id="task-title" type="text" placeholder="e.g., Finish tutorial">
                 </div>

                <!-- Notes -->
                <div class="form-row">
                    <label for="task-notes"><strong>Notes</strong></label>
                    <textarea id="task-notes" rows="3" placeholder="Optional..."></textarea>
                </div>

                <!-- Priority -->
                <div class="form-row">
                    <label for="task-priority"><strong>Priority</strong></label>
                    <select id="task-priority">
                        <option value="high">High</option>
                        <option value="medium" selected>Medium</option>
                        <option value="low">Low</option>
                    </select>
                </div> 
                

                 <!-- success message (if added task successfully) -->
                  <p id="task-status" class="task-status"></p>

                 <div class="modal-actions">
                    <button id="cancel-task-btn">Cancel</button>
                    <button id="delete-task-btn" class="hidden">Delete</button>
                    <button id="confirm-task-btn">Add</button> <!-- task adding confirmation -->
                 </div>
             </div>

             <!-- Assignments Due Today (second dashboard card) -->
              <div class="assignments-due">

             </div>

             <!-- Calendar View (third dashboard card) - not sure how I'll implement this just yet, so just keeping as a placeholder here for now to implement later -->

            <!-- System Settings -->
             <div class="system-settings">
                <button id="system-settings-btn">⚙️</button>
             </div>
        </main>
        
        <script src="index.js"></script>
    </body>
</html>
